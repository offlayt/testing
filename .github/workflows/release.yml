name: Windows C++ Release

on:
  create:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1.4.1
      with:
        arch: x64

    - name: Build Solution (Release)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path logs -Force | Out-Null
        msbuild 270226unit-tests.sln /p:Configuration=Release /p:Platform=x64 2>&1 | Tee-Object -FilePath logs/build-release.log
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Create Source Archive
      shell: pwsh
      run: |
        Compress-Archive -Path * -DestinationPath source.zip -Force 2>&1 | Tee-Object -FilePath logs/archive.log
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: source.zip

    - name: Upload release logs artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-logs
        path: logs/
        if-no-files-found: warn
